num_worker: 8
work_dir: ./work_dir/ntu_hdgcn/cross-subject/joint_CoM_1_backward_compatible/

# feeder
feeder: feeders.feeder_ntu.Feeder
train_feeder_args:
  data_path: ./data/ntu/NTU60_CS.npz
  split: train
  debug: False
  random_choose: False
  random_shift: False
  random_move: False
  window_size: 64
  normalization: False
  random_rot: True
  p_interval: [0.5, 1]
  bone: False

test_feeder_args:
  data_path: ./data/ntu/NTU60_CS.npz
  split: test
  window_size: 64
  p_interval: [0.95]
  bone: False
  debug: False

# model - Backward Compatible (使用旧参数格式)
model: model.HDGCN.Model
model_args:
  num_class: 60
  num_point: 25
  num_person: 2
  graph: graph.ntu_rgb_d_hierarchy.Graph
  graph_args:
    labeling_mode: 'spatial'
    CoM: 1
  
  # 向后兼容 - 使用旧参数格式 (会自动转换为新架构)
  base_channel: 64
  adaptive: True
  drop_out: 0.0
  
  # 旧参数格式 - 会自动映射到新架构
  modality: 2              # Motion模态 -> 自动转换为hybrid架构
  use_mctm_tcn: True       # 使用MCTM -> 自动配置时序建模

#optim
weight_decay: 0.0004
base_lr: 0.1
warm_up_epoch: 5

# training
device: [0]
batch_size: 64
test_batch_size: 64
num_epoch: 90
nesterov: True
